name: Build Beauty AI APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-

      - name: Install packages
        run: npm install --legacy-peer-deps

      - name: Add Android platform
        run: npx cap add android

      - name: Patch AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<application|<uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n\n    <application|' "$MANIFEST"
          sed -i 's|android:supportsRtl="true"|android:supportsRtl="true"\n        android:usesCleartextTraffic="true"\n        android:networkSecurityConfig="@xml/network_security_config"|' "$MANIFEST"

      - name: Add Network Security Config
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system"/>
              </trust-anchors>
            </base-config>
            <domain-config cleartextTrafficPermitted="true">
              <domain includeSubdomains="true">api.groq.com</domain>
              <domain includeSubdomains="true">translate.googleapis.com</domain>
              <domain includeSubdomains="true">cdnjs.cloudflare.com</domain>
              <domain includeSubdomains="true">fonts.googleapis.com</domain>
            </domain-config>
          </network-security-config>
          XMLEOF
          echo "✅ Network security config created"

      - name: Generate App Icons
        run: |
          sudo apt-get install -y imagemagick -q
          ICON="resources/icon.png"
          for density_size in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            density="${density_size%%:*}"
            size="${density_size##*:}"
            dir="android/app/src/main/res/mipmap-${density}"
            mkdir -p "$dir"
            convert "$ICON" -resize "${size}x${size}" "$dir/ic_launcher.png"
            convert "$ICON" -resize "${size}x${size}" "$dir/ic_launcher_round.png"
          done
          echo "✅ Icons generated"

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: beauty-ai-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
