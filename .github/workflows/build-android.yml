name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # خطوة أساسية لتفريغ مساحة القرص من الأدوات والملفات غير الضرورية في سيرفر جيتهاب
      - name: Free Disk Space (Room for Build)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install

      - name: Ensure @capacitor/android is installed
        run: npm install @capacitor/android

      - name: Install @capacitor/assets (optional - for icon/splash generation)
        run: npm install -D @capacitor/assets
        continue-on-error: true

      - name: Generate icons from logo (optional, only if assets plugin installed)
        run: |
          npx capacitor-assets generate --android \
            --iconBackgroundColor '#0e0512' \
            --iconBackgroundColorDark '#0e0512' \
            --icon www/assets/rosiva-logo.jpg || true

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      # تم إضافة clean هنا للتخلص من أي مخلفات بناء سابقة وتوفير مساحة إضافية
      - name: Build debug APK
        working-directory: android
        run: ./gradlew clean assembleDebug

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}