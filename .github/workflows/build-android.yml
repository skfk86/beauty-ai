name: Build Android AAB

on:
  push:
    branches: [ master, main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────
      # 1. تحضير البيئة
      # ─────────────────────────────────────────────
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc \
            "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'           # ✅ cache npm لتسريع البناء

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ─────────────────────────────────────────────
      # 2. تثبيت الحزم
      # ─────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ─────────────────────────────────────────────
      # 3. حقن مفتاح Groq API في الكود
      # ─────────────────────────────────────────────
      - name: Inject Groq API Key
        run: |
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "❌ خطأ: السر GROQ_API_KEY غير موجود في GitHub Secrets"
            exit 1
          fi
          sed -i "s|__GROQ_API_KEY__|${{ secrets.GROQ_API_KEY }}|g" www/index.html
          echo "✅ تم حقن مفتاح Groq API"

      # ─────────────────────────────────────────────
      # 3ب. حقن إعدادات Firebase الخاصة بالمشتري
      # ─────────────────────────────────────────────
      - name: Inject Firebase Config
        run: |
          missing=0
          for var in FIREBASE_API_KEY FIREBASE_AUTH_DOMAIN FIREBASE_PROJECT_ID FIREBASE_STORAGE_BUCKET FIREBASE_MESSAGING_SENDER_ID FIREBASE_APP_ID FIREBASE_MEASUREMENT_ID; do
            if [ -z "${!var}" ]; then
              echo "❌ خطأ: السر $var غير موجود في GitHub Secrets"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then exit 1; fi
          sed -i "s|__FIREBASE_API_KEY__|${FIREBASE_API_KEY}|g" www/index.html
          sed -i "s|__FIREBASE_AUTH_DOMAIN__|${FIREBASE_AUTH_DOMAIN}|g" www/index.html
          sed -i "s|__FIREBASE_PROJECT_ID__|${FIREBASE_PROJECT_ID}|g" www/index.html
          sed -i "s|__FIREBASE_STORAGE_BUCKET__|${FIREBASE_STORAGE_BUCKET}|g" www/index.html
          sed -i "s|__FIREBASE_MESSAGING_SENDER_ID__|${FIREBASE_MESSAGING_SENDER_ID}|g" www/index.html
          sed -i "s|__FIREBASE_APP_ID__|${FIREBASE_APP_ID}|g" www/index.html
          sed -i "s|__FIREBASE_MEASUREMENT_ID__|${FIREBASE_MEASUREMENT_ID}|g" www/index.html
          echo "✅ تم حقن إعدادات Firebase"
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}

      # ─────────────────────────────────────────────
      # 4. توليد الأيقونات وسينك Capacitor
      # ─────────────────────────────────────────────
      - name: Install Capacitor Assets (optional)
        run: npm install -D @capacitor/assets
        continue-on-error: true

      - name: Generate icons
        run: |
          npx capacitor-assets generate --android \
            --iconBackgroundColor '#0e0512' \
            --iconBackgroundColorDark '#0e0512' \
            --icon www/assets/rosiva-logo.jpg || true

      - name: Sync Capacitor Android project
        run: npx cap sync android

      # ─────────────────────────────────────────────
      # 5. فك تشفير الـ Keystore
      # ─────────────────────────────────────────────
      - name: Decode Keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "❌ خطأ: السر KEYSTORE_BASE64 غير موجود في GitHub Secrets"
            exit 1
          fi
          # tr -d يحذف أي أسطر جديدة أو مسافات قبل فك التشفير
          echo "${{ secrets.KEYSTORE_BASE64 }}" \
            | tr -d '\n\r ' \
            | base64 -d > android/app/rosiva-release.keystore
          echo "✅ تم فك تشفير الـ Keystore ($(wc -c < android/app/rosiva-release.keystore) bytes)"

      # ─────────────────────────────────────────────
      # 6. بناء AAB
      # ─────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Release AAB
        working-directory: android
        run: ./gradlew clean bundleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ─────────────────────────────────────────────
      # 7. رفع الـ AAB كـ Release
      # ─────────────────────────────────────────────
      - name: Upload AAB to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Rosiva v${{ github.run_number }}"
          files: android/app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
